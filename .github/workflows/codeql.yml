name: "CodeQL Analysis with Severity Gate"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  analyze:
    name: Analyze Java Code
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write          # 上传 SARIF 结果需要
      pull-requests: write            # 可选，用于在 PR 中添加评论

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'           # 根据你的项目实际 Java 版本修改

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      # ⚠️ 关键：必须构建项目，否则 CodeQL 无法分析 Java 代码
      - name: Build with Maven
        run: mvn clean compile          # 如果使用 Gradle，改为 gradle build

      - name: Perform CodeQL Analysis (no upload yet)
        uses: github/codeql-action/analyze@v3
        with:
          upload: false                 # 暂不上传，我们先检查结果
          output: codeql-results        # 将 SARIF 输出到该目录
      - name: Debug SARIF
        run: |
         cat codeql-results/*.sarif || echo "No sarif file"
         
      - name: Upload SARIF for debugging
        uses: actions/upload-artifact@v4
        with:
          name: codeql-sarif
          path: codeql-results/*.sarif
        if: always()
      # 解析 SARIF，如果存在高危/严重漏洞则让流水线失败
      - name: Parse SARIF and block on high/critical findings
        id: parse
        run: |
          # 找到 SARIF 文件（默认在 codeql-results 目录）
          SARIF_FILE=$(find codeql-results -name "*.sarif" -type f | head -n 1)
          if [ -z "$SARIF_FILE" ]; then
            echo "No SARIF file found, skipping gate."
            exit 0
          fi

          echo "Parsing SARIF file: $SARIF_FILE"

          # CodeQL 将高危/严重漏洞标记为 level = "error"
          HIGH_CRITICAL_COUNT=$(jq '[.runs[].results[] | select(.level == "error")] | length' "$SARIF_FILE")
          echo "High/Critical vulnerabilities found: $HIGH_CRITICAL_COUNT"

          if [ "$HIGH_CRITICAL_COUNT" -gt 0 ]; then
            echo "❌ Found $HIGH_CRITICAL_COUNT high/critical vulnerabilities. Pipeline will fail."
            # 可选：打印这些漏洞的详细信息
            jq '[.runs[].results[] | select(.level == "error") | {rule: .ruleId, message: .message.text, location: .locations[0].physicalLocation.artifactLocation.uri}]' "$SARIF_FILE"
            exit 1
          else
            echo "✅ No high/critical vulnerabilities. Pipeline allowed to pass."
            exit 0
          fi

      # 无论门禁是否通过，都将所有漏洞上传到 GitHub Security 选项卡
      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: codeql-results
        if: always()                    # 确保即使上一步失败，此步骤仍执行
