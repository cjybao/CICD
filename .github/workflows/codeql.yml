name: "CodeQL Analysis with Severity Gate"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  analyze:
    name: Analyze Java Code
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write          # 用于上传 SARIF 结果
      pull-requests: write            # 可选：用于在 PR 中添加评论

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'          # 根据项目实际 Java 版本调整

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java              # 指定语言为 Java

      - name: Build with Maven
        run: mvn clean compile        # 如果是 Gradle，则改为 gradle build

      - name: Perform CodeQL Analysis (no upload)
        uses: github/codeql-action/analyze@v3
        with:
          upload: false               # 先不上传，以便我们解析 SARIF 文件
          output: codeql-results      # 指定 SARIF 输出目录（可选）

      - name: Parse SARIF and block on high/critical findings
        id: parse
        run: |
          # 查找 SARIF 文件（通常位于 codeql-results/ 或 runner.temp 下）
          SARIF_FILE=$(find . -name "*.sarif" -type f | head -n 1)
          if [ -z "$SARIF_FILE" ]; then
            echo "No SARIF file found, skipping gate."
            exit 0
          fi

          echo "Parsing SARIF file: $SARIF_FILE"

          # 使用 jq 统计高危和严重漏洞数量
          HIGH_CRITICAL_COUNT=$(jq '[.runs[].results[] | select(.level == "error" or .level == "warning")] | length' "$SARIF_FILE" || echo "0")

          # 根据 CodeQL 的严重性映射：
          # CodeQL 中严重等级分为 error (严重/高危) 和 warning (中危/低危)
          # 这里我们将 error 视为阻塞条件
          if [ "$HIGH_CRITICAL_COUNT" -gt 0 ]; then
            echo "Found $HIGH_CRITICAL_COUNT high/critical vulnerabilities."
            echo "Pipeline will fail to block PR/commit."
            # 打印高危/严重漏洞详情（可选）
            jq '[.runs[].results[] | select(.level == "error")]' "$SARIF_FILE"
            exit 1
          else
            echo "No high/critical vulnerabilities found. Pipeline allowed to pass."
            exit 0
          fi

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: codeql-results   # 与上一步 output 目录保持一致
        if: always()                    # 无论上一步是否失败，都上传结果
