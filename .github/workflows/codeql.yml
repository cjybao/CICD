- name: Initialize CodeQL
  uses: github/codeql-action/init@v3
  with:
    languages: java
    queries: security-extended   # 启用更全面的安全规则

- name: Build with Maven
  run: mvn clean compile

- name: Perform CodeQL Analysis
  uses: github/codeql-action/analyze@v3
  with:
    upload: false
    output: codeql-results

- name: Parse SARIF and block on high/critical
  id: parse
  run: |
    SARIF_FILE=$(find codeql-results -name "*.sarif" -type f | head -n 1)
    if [ -z "$SARIF_FILE" ]; then
      echo "No SARIF file found, skipping gate."
      exit 0
    fi
    echo "Parsing $SARIF_FILE"
    HIGH_CRITICAL_COUNT=$(jq '[.runs[].results[] | select(.level == "error")] | length' "$SARIF_FILE")
    echo "High/Critical vulnerabilities: $HIGH_CRITICAL_COUNT"
    if [ "$HIGH_CRITICAL_COUNT" -gt 0 ]; then
      jq '[.runs[].results[] | select(.level == "error")]' "$SARIF_FILE"
      exit 1
    else
      echo "No blocking issues."
      exit 0
    fi

- name: Upload SARIF
  uses: github/codeql-action/upload-sarif@v3
  with:
    sarif_file: codeql-results
  if: always()
